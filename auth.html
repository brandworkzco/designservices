<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brandworkz | Client Portal Authentication</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full pointer-events-none"></div>

    <!-- Auth Card Container -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-2xl w-full max-w-lg space-y-6">
        
        <!-- Tab Selectors Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between border-b border-slate-850 pb-4 gap-3">
            <div>
                <h2 id="auth-title" class="text-xl font-extrabold text-white">Access Client Portal</h2>
                <p id="auth-subtitle" class="text-slate-400 text-xs mt-0.5">Sign in to track design requests and process orders.</p>
            </div>
            
            <div class="flex bg-slate-950 p-1 rounded-lg border border-slate-800 self-start">
                <button id="tab-login" onclick="toggleAuthTab('login')" class="px-4 py-1.5 text-xs font-bold rounded-md bg-yellow-400 text-slate-950 transition-all">Sign In</button>
                <button id="tab-register" onclick="toggleAuthTab('register')" class="px-4 py-1.5 text-xs font-bold rounded-md text-slate-400 hover:text-white transition-all">Sign Up</button>
            </div>
        </div>

        <!-- 1. LOGIN FORM -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Username</label>
                <input type="text" id="login-user" required placeholder="Enter username" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
            </div>
            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Password</label>
                <input type="password" id="login-pass" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-black rounded-lg text-xs uppercase tracking-widest shadow-lg transition-all">Verify Credentials</button>
        </form>

        <!-- 2. REGISTRATION / SIGN-UP FORM -->
        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Username *</label>
                    <input type="text" id="reg-user" required placeholder="Create unique username" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Email Address *</label>
                    <input type="email" id="reg-email" required placeholder="name@domain.com" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
                </div>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Phone Number *</label>
                    <input type="tel" id="reg-phone" required placeholder="e.g., +60123456789" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
                </div>
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Password *</label>
                    <input type="password" id="reg-pass" required placeholder="Create secure password" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none transition-all">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-300 uppercase tracking-wider">Billing / Contact Address *</label>
                <textarea id="reg-billing" required rows="3" placeholder="Enter complete corporate or home physical address parameters" class="w-full bg-slate-950 border border-slate-800 focus:border-yellow-400 rounded-lg p-2.5 text-xs sm:text-sm text-white outline-none resize-none transition-all"></textarea>
            </div>

            <button type="submit" class="w-full py-3.5 bg-yellow-400 hover:bg-yellow-500 text-slate-950 font-black rounded-lg text-xs uppercase tracking-widest shadow-lg transition-all">Create Profile & Register</button>
        </form>

        <!-- 3. SUCCESS / AUTHENTICATED STATE PANEL -->
        <div id="authenticated-panel" class="hidden space-y-4 text-center py-4 animate-fadeIn">
            <div class="w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-2xl flex items-center justify-center mx-auto">✓</div>
            <div>
                <h3 class="text-lg font-black text-white">Profile Verified Successfully</h3>
                <p id="welcome-message" class="text-slate-400 text-xs mt-1">Welcome back!</p>
            </div>
            <div class="bg-slate-950 border border-slate-850 p-4 rounded-xl text-left text-xs space-y-1.5">
                <p class="text-slate-400"><strong class="text-slate-200">Session ID:</strong> active_client_token</p>
                <p class="text-slate-400"><strong class="text-slate-200">Formspree Syncing:</strong> Enabled</p>
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="window.location.href='index.html'" class="flex-grow py-2.5 bg-slate-850 hover:bg-slate-800 border border-slate-750 font-bold text-xs rounded-xl transition-all text-center">Return to Shopfront</button>
                <button onclick="clearSession()" class="px-4 py-2.5 bg-rose-600/10 border border-rose-500/20 text-rose-400 hover:bg-rose-600 hover:text-white font-bold text-xs rounded-xl transition-all">Logout</button>
            </div>
        </div>

    </div>

    <!-- ENGINE CODE -->
    <script>
    <script>
    const FORMSPREE_HOOK_URL = "https://formspree.io/f/xaqzvwgr";

    function triggerToast(title, body, style = "success") {
        const container = document.getElementById('toast-container');
        const element = document.createElement('div');
        element.className = `p-3.5 rounded-xl border font-sans text-xs flex flex-col gap-0.5 shadow-xl transition-all duration-300 ${
            style === 'success' ? 'bg-slate-900 border-emerald-500/40 text-emerald-400' : 'bg-slate-900 border-rose-500/40 text-rose-400'
        }`;
        element.innerHTML = `<span class="font-extrabold uppercase text-[10px] tracking-wider">${title}</span><p class="text-slate-300 font-light">${body}</p>`;
        container.appendChild(element);
        setTimeout(() => { element.remove(); }, 4000);
    }

    function toggleAuthTab(targetTab) {
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const tabLoginBtn = document.getElementById('tab-login');
        const tabRegisterBtn = document.getElementById('tab-register');
        const title = document.getElementById('auth-title');

        if (targetTab === 'register') {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            title.innerText = "Register New Account";
            tabRegisterBtn.className = "px-4 py-1.5 text-xs font-bold rounded-md bg-yellow-400 text-slate-950 transition-all";
            tabLoginBtn.className = "px-4 py-1.5 text-xs font-bold rounded-md text-slate-400 hover:text-white transition-all";
        } else {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            title.innerText = "Access Client Portal";
            tabLoginBtn.className = "px-4 py-1.5 text-xs font-bold rounded-md bg-yellow-400 text-slate-950 transition-all";
            tabRegisterBtn.className = "px-4 py-1.5 text-xs font-bold rounded-md text-slate-400 hover:text-white transition-all";
        }
    }

    function handleLogin(event) {
        event.preventDefault();
        const usernameInput = document.getElementById('login-user').value.trim();
        const passwordInput = document.getElementById('login-pass').value;
        const user = JSON.parse(localStorage.getItem(`bz_user_${usernameInput}`));

        if (user && user.pass === passwordInput) {
            localStorage.setItem('bz_active_session', JSON.stringify(user));
            triggerToast("Access Granted", "Redirecting...", "success");
            setTimeout(() => { window.location.href = "portal.html"; }, 1000);
        } else {
            triggerToast("Authentication Failed", "Invalid credentials.", "error");
        }
    }

    function handleRegister(event) {
        event.preventDefault();
        const newUser = {
            username: document.getElementById('reg-user').value.trim(),
            email: document.getElementById('reg-email').value.trim(),
            pass: document.getElementById('reg-pass').value
        };

        if (localStorage.getItem(`bz_user_${newUser.username}`)) {
            triggerToast("Error", "Username exists.", "error");
            return;
        }

        localStorage.setItem(`bz_user_${newUser.username}`, JSON.stringify(newUser));
        localStorage.setItem('bz_active_session', JSON.stringify(newUser));
        triggerToast("Success", "Account created! Loading...", "success");
        setTimeout(() => { window.location.href = "portal.html"; }, 1000);
    }
</script></script>
</body>
</html>
